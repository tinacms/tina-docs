name: Search Functionality Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test (required)'
        required: true
        type: string
  workflow_call:
    inputs:
      base_url:
        description: 'Base URL to test (required)'
        required: true
        type: string
      NEXT_PUBLIC_BASE_PATH:
        description: 'Base path for the site'
        required: false
        default: ''
        type: string

jobs:
  test-search:
    name: Test Search Functionality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        id: setup
        uses: ./.github/actions/setup-deps

      - name: Install Playwright browsers
        timeout-minutes: 8
        # `--with-deps` shells out to apt, which intermittently wedges on the
        # runner's dpkg lock. Cap each attempt with `timeout` so a hang is killed
        # (a hang is not a non-zero exit, so a plain retry would never fire) and
        # retry a few times to ride out the transient lock.
        run: |
          for attempt in 1 2 3; do
            echo "::group::playwright install (attempt $attempt)"
            if timeout 180 npx playwright install chromium --with-deps; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed or timed out; retrying in 15s..."
            sleep 15
          done
          echo "Playwright browser install failed after 3 attempts."
          exit 1

      - name: Run search tests
        run: ${{ steps.setup.outputs.runner }} test
        env:
          BASE_URL: ${{ inputs.base_url }}
          NEXT_PUBLIC_BASE_PATH: ${{ inputs.NEXT_PUBLIC_BASE_PATH || '' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  report-results:
    name: Report Test Results
    runs-on: ubuntu-latest
    needs: [test-search]
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: test-results/

      - name: Create test summary
        run: |
          echo "## Search Functionality Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "test-results/test-results/test-results/results.json" ]; then
            echo "### Search Tests ✅" >> $GITHUB_STEP_SUMMARY
            echo "Search tests completed successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Search Tests ❌" >> $GITHUB_STEP_SUMMARY
            echo "Search tests failed or were not run." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the artifacts for detailed test reports." >> $GITHUB_STEP_SUMMARY
