name: Search Functionality Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test (required)'
        required: true
        type: string
  workflow_call:
    inputs:
      base_url:
        description: 'Base URL to test (required)'
        required: true
        type: string
      NEXT_PUBLIC_BASE_PATH:
        description: 'Base path (required)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA to wait for (uses GitHub Deployments API)'
        required: false
        type: string

jobs:
  test-search:
    name: Test Search Functionality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for deployment to be ready
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$COMMIT_SHA" ]; then
            echo "No commit SHA provided, skipping deployment wait"
            exit 0
          fi
          echo "Waiting for Vercel deployment of ${COMMIT_SHA:0:7}..."
          for i in $(seq 1 60); do
            DEPLOYMENT_ID=$(gh api "repos/$REPO/deployments?sha=$COMMIT_SHA&environment=Preview&per_page=1" --jq '.[0].id // empty' 2>/dev/null)
            if [ -n "$DEPLOYMENT_ID" ]; then
              STATE=$(gh api "repos/$REPO/deployments/$DEPLOYMENT_ID/statuses?per_page=1" --jq '.[0].state // empty' 2>/dev/null)
              if [ "$STATE" = "success" ]; then
                echo "Deployment is ready (attempt $i)"
                exit 0
              fi
              echo "Attempt $i: state=$STATE"
            else
              echo "Attempt $i: no deployment found yet"
            fi
            sleep 5
          done
          echo "Deployment not ready after 5 minutes"
          exit 1

      - name: Run search tests
        run: pnpm test
        env:
          BASE_URL: ${{ inputs.base_url }}
          NEXT_PUBLIC_BASE_PATH: ${{ inputs.NEXT_PUBLIC_BASE_PATH || '' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  report-results:
    name: Report Test Results
    runs-on: ubuntu-latest
    needs: [test-search]
    if: always()
    
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: test-results/

      - name: Create test summary
        run: |
          echo "## Search Functionality Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "test-results/test-results/test-results/results.json" ]; then
            echo "### Search Tests ✅" >> $GITHUB_STEP_SUMMARY
            echo "Search tests completed successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Search Tests ❌" >> $GITHUB_STEP_SUMMARY
            echo "Search tests failed or were not run." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the artifacts for detailed test reports." >> $GITHUB_STEP_SUMMARY
