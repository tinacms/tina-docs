name: Search Functionality Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test (required)'
        required: true
        type: string
  workflow_call:
    inputs:
      base_url:
        description: 'Base URL to test (required)'
        required: true
        type: string
      NEXT_PUBLIC_BASE_PATH:
        description: 'Base path for the site'
        required: false
        default: ''
        type: string

jobs:
  test-search:
    name: Test Search Functionality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        id: setup
        uses: ./.github/actions/setup-deps

      - name: Install Playwright browsers
        timeout-minutes: 10
        # `--with-deps` runs `sudo apt-get`, which fetched and unpacked fine but
        # then hung deterministically in the configure phase — zero output for the
        # full timeout on every attempt. The cause is apt blocking on an
        # interactive frontend (needrestart/debconf) with no TTY to answer it, so
        # the old per-attempt-timeout-plus-retry just repeated the same stall and
        # then blew the step cap. Force the debconf frontend non-interactive in the
        # debconf database so the sudo apt-get Playwright spawns reads it and never
        # prompts. One attempt, generous cap — no retry, because the failure was
        # deterministic, not transient.
        run: |
          echo 'debconf debconf/frontend select Noninteractive' | sudo debconf-set-selections
          npx playwright install chromium --with-deps

      - name: Run search tests
        run: ${{ steps.setup.outputs.runner }} test
        env:
          BASE_URL: ${{ inputs.base_url }}
          NEXT_PUBLIC_BASE_PATH: ${{ inputs.NEXT_PUBLIC_BASE_PATH || '' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  report-results:
    name: Report Test Results
    runs-on: ubuntu-latest
    needs: [test-search]
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: test-results/

      - name: Create test summary
        run: |
          echo "## Search Functionality Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "test-results/test-results/test-results/results.json" ]; then
            echo "### Search Tests ✅" >> $GITHUB_STEP_SUMMARY
            echo "Search tests completed successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Search Tests ❌" >> $GITHUB_STEP_SUMMARY
            echo "Search tests failed or were not run." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the artifacts for detailed test reports." >> $GITHUB_STEP_SUMMARY
